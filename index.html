<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Resi Fix Mode</title>

<script src="qrcode.min.js"></script>

<script src="jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fa;
}

.container {
  padding: 16px;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

textarea {
  width: 100%;
  height: 150px;
  margin-top: 10px;
  border-radius: 10px;
  padding: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #2d8cff;
  color: white;
  font-size: 16px;
}
</style>

</head>

<body>

<div class="container">

  <div class="title">QR Resi Generator</div>

  <textarea id="resiInput" placeholder="input text"></textarea>

<button onclick="generatePDF()">Generate</button>

</div>

<script>
async function generatePDF() {

  const { jsPDF } = window.jspdf;

  const input = document.getElementById("resiInput").value;

  // =========================
  // 🔥 AUTO CLEAN RESI WA
  // =========================
  const resiList = [...new Set(
    input
      .split("\n")
      .map(r => {
        const match = r.match(/jx\d+/i);
        return match ? match[0].toUpperCase() : null;
      })
      .filter(r => r)
  )];

  if (resiList.length === 0) {
    alert("Tidak ada resi valid");
    return;
  }

  // =========================
  // ⚙️ SETTING UTAMA
  // =========================

  const paperWidth = 58;

  const qrSize = 28; // ukuran QR FIX

  const gapX = 2; // jarak kiri kanan

  const textGap = 1; // jarak QR ke teks

  const rowGap = 1; // jarak antar baris

  const marginTop = 1; // atas

  const marginBottom = 2; // bawah

  const fontSize = 9;

  // =========================
  // 🔥 PERHITUNGAN FIX (INI KUNCI)
  // =========================

  const colWidth = (paperWidth - gapX) / 2;

  // 👉 tinggi baris dibuat cukup longgar agar tidak ke-clip
  const rowHeight = qrSize + textGap + 8 + rowGap;

  let pdf = null;
  let i = 0;

  while (i < resiList.length) {

    let remaining = resiList.length - i;

    let itemsThisPage = Math.min(remaining, 10);

    let rows = Math.ceil(itemsThisPage / 2);

    // 🔥 TINGGI PURE (tanpa hack)
    let pageHeight = rows * rowHeight + marginTop + marginBottom;

    if (!pdf) {
      pdf = new jsPDF({
        unit: "mm",
        format: [paperWidth, pageHeight]
      });
    } else {
      pdf.addPage([paperWidth, pageHeight]);
    }

    let y = marginTop;

    for (let r = 0; r < rows; r++) {
      for (let col = 0; col < 2; col++) {

        if (i >= resiList.length) break;

        const resi = resiList[i];

        // =========================
        // 🔲 QR
        // =========================
        const canvas = document.createElement("canvas");
        await QRCode.toCanvas(canvas, resi, { width: 200 });

        const img = canvas.toDataURL("image/png");

        let x = col * (colWidth + gapX) + (colWidth - qrSize)/2;

        pdf.addImage(img, "PNG", x, y, qrSize, qrSize);

        // =========================
        // 🔤 TEXT
        // =========================
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(fontSize);

        pdf.text(resi, x + qrSize/2, y + qrSize + textGap, {
          align: "center"
        });

        i++;
      }

      y += rowHeight;
    }
  }

  // =========================
  // 📄 OPEN PDF
  // =========================
  const blob = pdf.output('blob');
  const url = URL.createObjectURL(blob);

  window.open(url, '_blank');
}
</script>

</body>
</html>
