<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Resi Final</title>

<script src="qrcode.min.js"></script>

<script src="jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fa;
}

.container {
  padding: 16px;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

textarea {
  width: 100%;
  height: 150px;
  margin-top: 10px;
  border-radius: 10px;
  padding: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #2d8cff;
  color: white;
  font-size: 16px;
}
</style>

</head>

<body>

<div class="container">

  <div class="title">QR Resi Generator</div>

  <textarea id="resiInput" placeholder="Paste dari WhatsApp"></textarea>

<button onclick="generatePDF()">Generate</button>

</div>

<script>
async function generatePDF() {

  const { jsPDF } = window.jspdf;

  const input = document.getElementById("resiInput").value;

  // =========================
  // 🔥 AUTO CLEAN WA
  // =========================
  const resiList = [...new Set(
    input
      .split("\n")
      .map(r => {
        const match = r.match(/jx\d+/i);
        return match ? match[0].toUpperCase() : null;
      })
      .filter(r => r)
  )];

  if (resiList.length === 0) {
    alert("Tidak ada resi valid");
    return;
  }

  // =========================
  // ⚙️ SETTING UTAMA
  // =========================

  const paperWidth = 58; // lebar kertas

  const qrSize = 28; // 🔺 ukuran QR (diperkecil dikit biar aman)

  const gapX = 1; // jarak antar QR kiri-kanan

  const marginX = 2; // 🔥 margin kiri kanan (WAJIB BIAR TIDAK KEPOTONG)

  const textGap = 1; // jarak QR ke teks

  const rowGap = 1; // jarak antar baris

  const marginTop = 1;

  const marginBottom = 2;

  const fontSize = 9;

  // =========================
  // ⚙️ PERHITUNGAN LAYOUT
  // =========================

  const usableWidth = paperWidth - (marginX * 2);

  const colWidth = (usableWidth - gapX) / 2;

  const rowHeight = qrSize + textGap + 8 + rowGap;

  let pdf = null;
  let i = 0;

  while (i < resiList.length) {

    let remaining = resiList.length - i;

    let itemsThisPage = Math.min(remaining, 10);

    let rows = Math.ceil(itemsThisPage / 2);

    let pageHeight = rows * rowHeight + marginTop + marginBottom;

    if (!pdf) {
      pdf = new jsPDF({
        unit: "mm",
        format: [paperWidth, pageHeight]
      });
    } else {
      pdf.addPage([paperWidth, pageHeight]);
    }

    let y = marginTop;

    for (let r = 0; r < rows; r++) {
      for (let col = 0; col < 2; col++) {

        if (i >= resiList.length) break;

        const resi = resiList[i];

        // =========================
        // 🔲 QR GENERATE
        // =========================
        const canvas = document.createElement("canvas");
        await QRCode.toCanvas(canvas, resi, { width: 200 });

        const img = canvas.toDataURL("image/png");

        // 🔥 posisi X sudah pakai margin (ANTI KEPOTONG)
        let x = marginX + col * (colWidth + gapX) + (colWidth - qrSize)/2;

        pdf.addImage(img, "PNG", x, y, qrSize, qrSize);

        // =========================
        // 🔤 TEXT RESI
        // =========================
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(fontSize);

        pdf.text(resi, x + qrSize/2, y + qrSize + textGap, {
          align: "center"
        });

        i++;
      }

      y += rowHeight;
    }
  }

  // =========================
  // 📄 OPEN PDF
  // =========================
  const blob = pdf.output('blob');
  const url = URL.createObjectURL(blob);

  window.open(url, '_blank');
}
</script>

</body>
</html>
