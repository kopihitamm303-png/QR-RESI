<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Resi</title>

<!-- Library QR -->

<script src="qrcode.min.js"></script>

<!-- Library PDF -->

<script src="jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f7fa;
}

.container {
  padding: 16px;
}

.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  height: 160px;
  border-radius: 10px;
  border: 1px solid #ccc;
  padding: 10px;
  font-size: 14px;
}

button {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #2d8cff;
  color: white;
  font-size: 16px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

  <div class="title">QR Resi Generator</div>

  <textarea id="resiInput" placeholder="input text"></textarea>

<button onclick="generatePDF()">Generate & Print</button>

</div>

<script>
async function generatePDF() {

  const { jsPDF } = window.jspdf;

  const input = document.getElementById("resiInput").value;

  // =========================
  // 🔥 AUTO CLEAN RESI WA
  // =========================
  const resiList = [...new Set(
    input
      .split("\n")
      .map(r => {
        // ambil hanya kode JX + angka (case insensitive)
        const match = r.match(/jx\d+/i);
        return match ? match[0].toUpperCase() : null;
      })
      .filter(r => r)
  )];

  if (resiList.length === 0) {
    alert("Tidak ada resi");
    return;
  }

  // =========================
  // ⚙️ SETTING UTAMA (EDIT DISINI)
  // =========================

  const paperWidth = 58; 
  // 👉 Lebar kertas (58mm thermal)

  const qrSize = 35; 
  // 👉 UKURAN QR (SEMUA QR SAMA)
  // 🔺 ini yang menentukan besar kecil QR

  const gapX = 2; 
  // 👉 JARAK ANTAR QR KE SAMPING (horizontal)

  const textGap = 1; 
  // 👉 JARAK QR KE TEXT DI BAWAH

  const rowGap = 1; 
  // 👉 JARAK ANTAR BARIS (KE BAWAH)
  // 🔽 kecil = hemat kertas

  const marginTop = 2; 
  // 👉 JARAK DARI ATAS KERTAS

  const marginBottom = 2; 
  // 👉 JARAK BAWAH (BIAR TIDAK KEPOTONG)

  const fontSize = 10; 
  // 👉 UKURAN TEXT RESI

  // =========================
  // ⚙️ PERHITUNGAN OTOMATIS
  // =========================

  const colWidth = (paperWidth - gapX) / 2;
  // 👉 lebar tiap kolom QR

  const rowHeight = qrSize + textGap + 5 + rowGap;
  // 👉 tinggi 1 baris (QR + text + jarak)

  let pdf = null;
  let i = 0;

  while (i < resiList.length) {

    let remaining = resiList.length - i;

    let itemsThisPage = Math.min(remaining, 10);
    // 👉 max 10 resi per halaman

    let rows = Math.ceil(itemsThisPage / 2);
    // 👉 hitung jumlah baris

    let pageHeight = rows * rowHeight + marginTop + marginBottom;
    // 👉 tinggi halaman otomatis (hemat kertas)

    if (!pdf) {
      pdf = new jsPDF({ unit: "mm", format: [paperWidth, pageHeight] });
    } else {
      pdf.addPage([paperWidth, pageHeight]);
    }

    let y = marginTop;

    for (let r = 0; r < rows; r++) {
      for (let col = 0; col < 2; col++) {

        if (i >= resiList.length) break;

        const resi = resiList[i];

        // =========================
        // 🔥 GENERATE QR
        // =========================
        const canvas = document.createElement("canvas");
        await QRCode.toCanvas(canvas, resi, { width: 200 });

        const img = canvas.toDataURL("image/png");

        let x = col * (colWidth + gapX) + (colWidth - qrSize)/2;
        // 👉 posisi kiri / kanan QR

        pdf.addImage(img, "PNG", x, y, qrSize, qrSize);

        // =========================
        // 🔤 TEXT RESI
        // =========================
        pdf.setFont("helvetica", "bold");
        pdf.setFontSize(fontSize);

        pdf.text(resi, x + qrSize/2, y + qrSize + textGap, {
          align: "center"
        });

        i++;
      }

      y += rowHeight;
      // 👉 turun ke baris berikutnya
    }
  }

  // =========================
  // 📄 OPEN PDF LANGSUNG
  // =========================
  const blob = pdf.output('blob');
  const url = URL.createObjectURL(blob);

  window.open(url, '_blank');
}
</script>

</body>
</html>
